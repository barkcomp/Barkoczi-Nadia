<!DOCTYPE HTML>
<html>
	<head>
		<title>Barkoczi Nadia - Workshop</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<style>
  :root { --gap: 14px; --radius: 16px; }

  .gallery {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 var(--gap);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);
  }

  /* Stack on small screens */
  @media (max-width: 700px) {
    .gallery { grid-template-columns: 1fr; }
  }

  .card {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius);
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    background: #fff;
  }

  .card img {
    display: block;
    width: 100%;
    height: 260px;          /* uniform height */
    object-fit: cover;      /* crop to fill nicely */
    transition: transform .35s ease;
  }

  .card:hover img { transform: scale(1.04); }

  .caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 10px 12px;
    font: 600 14px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: white;
    background: linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0));
  }
  
  .lightbox {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    align-items: center;
    justify-content: center;
  }
  .lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
  }
</style>
	</head>
	<body class="is-preload">

			<header id="header">
				<a href="index.html#one" class="title">&larr; Back</a>
			</header>

			<div id="wrapper">
					<div class="gallery">
						  <figure class="card">
							<img src="images/w1.0.jpeg" alt="Photo" onclick="openLightbox(this.src)">
							<figcaption class="caption">Photo 1</figcaption>
						  </figure>

						  <figure class="card">
							<img src="images/w1.1.jpeg" alt="Photo" onclick="openLightbox(this.src)">
							<figcaption class="caption">Photo 2</figcaption>
						  </figure>

						  <figure class="card">
							<img src="images/w1.2.jpeg" alt="Photo" onclick="openLightbox(this.src)">
							<figcaption class="caption">Photo 3</figcaption>
						  </figure>
					</div>
					<div style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
						<button id="button" onclick="togglePDF()" style="align-item:center">Preview PDF</button>
						<div id="pdfBox" style="width:600px; height:400px; border:1px solid #ccc; display:none; margin-top:10px;">
							<iframe 
							src="pdf/Împreună pentru viitorii profesori ai mileniului trei.pdf" 
							width="100%" 
							height="100%">
							</iframe>
						</div>
						<script src="assets/js/zplus.js"></script>
					</div>
			
			<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
				<img id="lightbox-img" src="">
			</div>			
		
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.scrollex.min.js"></script>
			<script src="assets/js/jquery.scrolly.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>

	</body>
</html>
