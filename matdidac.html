		<style>
  :root { --gap: 14px; --radius: 16px; }
	
	body {
    margin: 0;
    height: 100vh; /* Full screen */
    display: flex;
    flex-direction: column;
    align-items: justify;
    justify-content: flex-start; /* Keep buttons at the top */
  }
  
  

  .pdf-container {
    display: none; /* Hidden by default */
    margin-top: 20px;
    width: 80%;       /* Adjust size as needed */
    height: 80vh;     /* Keep a nice viewport height */
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .gallery {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 var(--gap);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--gap);
  }

  /* Stack on small screens */
  @media (max-width: 700px) {
    .gallery { grid-template-columns: 1fr; }
  }

  .card {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius);
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
    background: #fff;
  }

  .card img {
    display: block;
    width: 100%;
    height: 260px;          /* uniform height */
    object-fit: cover;      /* crop to fill nicely */
    transition: transform .35s ease;
  }

  .card:hover img { transform: scale(1.04); }

  .caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 10px 12px;
    font: 600 14px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: white;
    background: linear-gradient(to top, rgba(0,0,0,.55), rgba(0,0,0,0));
  }
  
  .lightbox {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0; top: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    align-items: center;
    justify-content: center;
  }
  .lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
  }
</style>

    <div id="pdf1" class="pdf-container" style="width:300px; height:200px; border:1px solid #ccc; display:none; margin-top:10px;">
      <iframe src="pdf/Prezentarea.pdf" width="256%" height="240%"></iframe>

  <!-- Second button + PDF -->
  <div style="text-align:center;">
    <button id="btn2" onclick="togglePDF('pdf2', this)">Show PDF 2</button>
    <div id="pdf2" class="pdf-container" style="width:300px; height:200px; border:1px solid #ccc; display:none; margin-top:10px;">
      <iframe src="pdf/Anunț expoziție.pdf" width="256%" height="240%"></iframe>

  <!-- Third button + PDF -->
  

</div>

<script>
	
function togglePDF(id, btn) {
    let box = document.getElementById(id);
    let p1 = document.getElementById('pdf1');
    let p2 = document.getElementById('pdf2');
    

    let bt1 = document.getElementById('btn1');
    let bt2 = document.getElementById('btn2');


    if (box.style.display === "none" || box.style.display === "") {
        // Hide all PDFs first
        p1.style.display = "none";
        p2.style.display = "none";


        bt1.innerText = "Show PDF 1";
        bt2.innerText = "Show PDF 2";


        // Show only the selected one
        box.style.display = "block";
        btn.innerText = "Hide PDF";
    } else {
        // Hide it if already shown
        box.style.display = "none";
        bt1.innerText = "Show PDF 1";
        bt2.innerText = "Show PDF 2";
    }
}
</script>
